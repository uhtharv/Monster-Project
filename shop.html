<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop — Monster Energy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/shop.css" />
    <script src="js/loader.js"></script>
  </head>
  <body class="shop-body">
    <!-- ── Page Loader ─────────────────────────────────── -->
    <div id="page-loader" class="page-loader">
      <img src="monster-logo-1.svg" class="loader-logo" alt="Loading" />
      <p class="loader-text">UNLEASHING THE BEAST</p>
    </div>

    <!-- ── Navbar ──────────────────────────────────────── -->
    <nav id="navbar" class="navbar-solid">
      <a href="index.html" class="nav-logo">
        <img src="monster-energy-1.svg" alt="Monster Energy" />
      </a>
      <a href="index.html" class="back-link">← Back</a>
    </nav>

    <!-- ── Shop Hero ──────────────────────────────────── -->
    <section class="shop-hero">
      <h1 class="shop-title">Shop</h1>
      <p class="shop-subtitle">Choose your fuel</p>
    </section>

    <!-- ── Products Grid ──────────────────────────────── -->
    <section class="products-section">
      <div class="products-grid">

        <!-- Product 1: Monster Energy Original -->
        <div class="product-card">
          <div class="product-image-wrapper">
            <img src="meng.webp" alt="Monster Energy Original" class="product-image" />
            <div class="product-glow green-glow"></div>
          </div>
          <h2 class="product-name">Monster Energy</h2>
          <p class="product-flavor">Original Green</p>
        </div>

        <!-- Product 2: Monster Ultra -->
        <div class="product-card">
          <div class="product-image-wrapper">
            <img src="mengultra.webp" alt="Monster Energy Ultra" class="product-image" />
            <div class="product-glow white-glow"></div>
          </div>
          <h2 class="product-name">Monster Ultra</h2>
          <p class="product-flavor">Zero Sugar</p>
        </div>

      </div>
    </section>

    <!-- ── Footer ─────────────────────────────────────── -->
    <footer id="site-footer" class="shop-footer">
      <div class="footer-inner">
        <div class="footer-logo">
          <img src="monster-energy-1.svg" alt="Monster Energy" />
          <p class="footer-tagline">Unleash The Beast&trade;</p>
        </div>
        <div class="footer-right">
          <nav class="footer-nav">
            <a href="index.html" class="footer-nav-link">Home</a>
            <a href="#" class="footer-nav-link">Events</a>
          </nav>
        </div>
      </div>
      <div class="footer-bottom">
        <div class="footer-bottom-line"></div>
        <p class="footer-copyright">&copy; 2026 Monster Energy. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
